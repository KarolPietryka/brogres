spring:
  application:
    name: brogres

  datasource:
    url: jdbc:h2:mem:brogres;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    org.springframework.web: TRACE
    org.springframework.web.servlet.DispatcherServlet: TRACE
