server:
  port: ${PORT:8080}

brogres:
  security:
    jwt-secret: ${JWT_SECRET:brogres-dev-secret-key-min-32-chars-long!!}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:604800000}

spring:
  application:
    name: brogres
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

  datasource:
    url: jdbc:h2:mem:brogres;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  sql:
    init:
      mode: never

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.dryrun.brogres: DEBUG
