spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: never

  h2:
    console:
      enabled: false

logging:
  level:
    com.dryrun.brogres: INFO

# Loki push (see logback-spring.xml) — set on Render as env vars
brogres:
  grafana:
    loki-url: ${GRAFANA_LOKI_URL}
    loki-user: ${GRAFANA_LOKI_USER}
    loki-password: ${GRAFANA_LOKI_PASSWORD}
